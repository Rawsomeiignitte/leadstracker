<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWSOME MISSION CONTROL</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f1;color:#1a1a1a}
.topbar{background:#111;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:10px}
.logo{font-size:15px;font-weight:700;white-space:nowrap}
.logo span{color:#b5841a}
.save-badge{font-size:11px;color:#b5841a;font-weight:600;min-width:120px}
.topbar-btns{display:flex;gap:8px;flex-shrink:0}
.btn{padding:7px 14px;border-radius:7px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.btn-gold{background:#b5841a;color:#fff}
.btn-dark{background:#333;color:#fff}
.tabs{background:#fff;border-bottom:2px solid #e8e8e8;display:flex;padding:0 20px;position:sticky;top:48px;z-index:99}
.tab{padding:12px 18px;font-size:13px;font-weight:600;color:#999;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit}
.tab.on{color:#b5841a;border-bottom-color:#b5841a}
.wrap{max-width:1080px;margin:0 auto;padding:16px}
.panel{display:none}.panel.on{display:block}

/* Stats bar */
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.sbox{background:#fff;border:1px solid #e4e4e4;border-radius:9px;padding:10px 14px;text-align:center;flex:1;min-width:90px}
.snum{font-size:22px;font-weight:800;color:#b5841a}
.slbl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{border:1px solid #ddd;border-radius:7px;padding:8px 12px;font-size:13px;font-family:inherit;background:#fff}
.toolbar input{flex:1;min-width:160px}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:#b5841a}

/* Cards */
.grid{display:grid;gap:8px}
.card{background:#fff;border:1px solid #e4e4e4;border-radius:10px;padding:14px 16px}
.card.dim{opacity:.5}
.card-flash{animation:cardFlash 2.2s ease;border-color:#b5841a !important;box-shadow:0 0 0 3px rgba(181,132,26,.35)}
@keyframes cardFlash{0%{box-shadow:0 0 0 4px rgba(181,132,26,.6)}100%{box-shadow:0 0 0 3px rgba(181,132,26,0)}}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-name{font-size:14px;font-weight:700}
.card-badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.bdg{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700}
.b-love{background:#fde8e8;color:#c03030}
.b-like{background:#e8eeff;color:#2a4acc}
.b-cmt{background:#f0e8ff;color:#6a20c0}
.edit-btn{font-size:11px;padding:4px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0}
.edit-btn:hover{border-color:#b5841a;color:#b5841a}
.card select{width:100%;border:1px solid #eee;border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;background:#fafaf8;margin-bottom:7px;cursor:pointer}
.card select:focus{outline:none;border-color:#b5841a}
.card textarea{width:100%;border:1px solid #eee;border-radius:6px;padding:8px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:48px;background:#fafaf8}
.card textarea:focus{outline:none;border-color:#b5841a}
.card textarea::placeholder{color:#ccc}
.saved-flash{font-size:10px;color:#28a745;font-weight:700;margin-top:3px;height:14px}
.checks-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:8px 0}
.chk-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#555;cursor:pointer;padding:5px 8px;border-radius:6px;border:1px solid #eee;background:#fafaf8;transition:.15s;user-select:none}
.chk-item:hover{border-color:#b5841a55;background:#fffbf2}
.chk-item.ck-green{background:#f0fdf0;border-color:#2d7a2d55;color:#1a5c1a;font-weight:600}
.chk-item.ck-gold{background:#fffbf0;border-color:#b5841a55;color:#7a5010;font-weight:600}
.chk-item.ck-blue{background:#f0f4ff;border-color:#2a4acc55;color:#1a2a8a;font-weight:600}
.chk-box{width:14px;height:14px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;background:#fff}
.chk-item.ck-green .chk-box{background:#28a745;border-color:#28a745;color:#fff}
.chk-item.ck-gold .chk-box{background:#b5841a;border-color:#b5841a;color:#fff}
.chk-item.ck-blue .chk-box{background:#2a4acc;border-color:#2a4acc;color:#fff}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#bbb;margin-top:8px;margin-bottom:3px}
.nurture-sel{width:100%;border:1.5px solid #b5841a44;border-radius:7px;padding:6px 10px;font-size:12px;font-family:inherit;background:#fffbf8;color:#7a5010;font-weight:600;cursor:pointer;margin-bottom:6px}
.nurture-sel:focus{outline:none;border-color:#b5841a}
.nurture-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;display:inline-block;margin-bottom:6px}
.nb-r1000{background:#fffbf0;color:#7a5010;border:1px solid #b5841a44}
.nb-unicorn{background:#fdf0ff;color:#6a0080;border:1px solid #aa44cc44}
.nb-rawsome_x{background:#fff0e8;color:#8a2000;border:1px solid #cc440044}
.nb-superva{background:#e8f5ff;color:#0a4a8a;border:1px solid #2244aa44}
.nb-p1_referral{background:#f0fff0;color:#1a5a1a;border:1px solid #44aa4444}
.pipeline-checks{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:6px 0}
.journey-wrap{margin:8px 0}
.journey-stages{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.j-stage{flex:1;min-width:0;text-align:center;padding:5px 3px;border-radius:7px;border:1.5px solid #eee;background:#fafaf8;cursor:pointer;transition:.2s;position:relative;select:none}
.j-stage:hover{border-color:#b5841a;background:#fffbf2;transform:scale(1.05)}
.j-stage.j-done{background:#e8f5e8;border-color:#2d7a2d55}
.j-stage.j-active{background:#b5841a;border-color:#b5841a;box-shadow:0 0 0 3px #b5841a33}
.j-stage.j-declined{background:#fff0f0;border-color:#dc354544}
.j-num{font-size:9px;font-weight:800;color:#bbb;display:block;line-height:1}
.j-stage.j-done .j-num{color:#2d7a2d}
.j-stage.j-active .j-num{color:#fff}
.j-stage.j-declined .j-num{color:#dc3545}
.j-icon{font-size:13px;display:block;margin:2px 0}
.j-stage.j-done .j-icon{filter:none}
.j-lbl{font-size:8px;color:#aaa;display:block;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.j-stage.j-done .j-lbl{color:#2d7a2d}
.j-stage.j-active .j-lbl{color:#fff;font-weight:700}
.j-flags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.j-flag{display:flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid #eee;background:#fafaf8;cursor:pointer;user-select:none;transition:.12s;white-space:nowrap}
.j-flag:hover{border-color:#b5841a44}
.j-flag.jf-on{font-weight:700}
.jf-recording.jf-on{background:#e8f0ff;border-color:#2a4acc44;color:#1a2a8a}
.jf-followup.jf-on{background:#fff8e0;border-color:#b5841a44;color:#7a5010}
.jf-cold.jf-on{background:#f0f8ff;border-color:#0a5a9a44;color:#0a3a6a}
.jf-declined.jf-on{background:#fff0f0;border-color:#dc354544;color:#8a2020}
.j-flag .jf-box{width:12px;height:12px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;background:#fff}
.jf-recording.jf-on .jf-box,.jf-followup.jf-on .jf-box,.jf-cold.jf-on .jf-box{background:#28a745;border-color:#28a745;color:#fff}
.jf-declined.jf-on .jf-box{background:#dc3545;border-color:#dc3545;color:#fff}
.pip-chk{display:flex;align-items:center;gap:6px;font-size:11px;color:#555;cursor:pointer;padding:5px 8px;border-radius:6px;border:1px solid #eee;background:#fafaf8;user-select:none;transition:.12s}
.pip-chk:hover{border-color:#b5841a44;background:#fffbf2}
.pip-chk.pc-on{background:#f0fdf0;border-color:#2d7a2d55;color:#1a5c1a;font-weight:600}
.pip-chk.pc-gold{background:#fffbf0;border-color:#b5841a55;color:#7a5010;font-weight:600}
.pip-chk.pc-red{background:#fff0f0;border-color:#dc354533;color:#8a2020;font-weight:600}
.pip-chk.pc-blue{background:#f0f4ff;border-color:#2a4acc44;color:#1a2a8a;font-weight:600}
.pip-chk.pc-purple{background:#f5f0ff;border-color:#6a20c044;color:#4a0a9a;font-weight:600}
.pc-box{width:14px;height:14px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;background:#fff}
.pip-chk.pc-on .pc-box{background:#28a745;border-color:#28a745;color:#fff}
.pip-chk.pc-gold .pc-box{background:#b5841a;border-color:#b5841a;color:#fff}
.pip-chk.pc-red .pc-box{background:#dc3545;border-color:#dc3545;color:#fff}
.pip-chk.pc-blue .pc-box{background:#2a4acc;border-color:#2a4acc;color:#fff}
.pip-chk.pc-purple .pc-box{background:#6a20c0;border-color:#6a20c0;color:#fff}
.pip-divider{grid-column:1/-1;height:1px;background:#f0f0f0;margin:2px 0}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;margin-bottom:14px}
.fg{margin-bottom:12px}
.fg label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#777;display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid #ddd;border-radius:7px;padding:8px 12px;font-size:13px;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#b5841a}
.fg textarea{resize:vertical;min-height:80px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.btn-red{background:#dc3545;color:#fff}
.btn-gray{background:#eee;color:#444}

/* Summary */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.scard{background:#fff;border:1px solid #e4e4e4;border-radius:10px;padding:16px}
.scard h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#aaa;margin-bottom:12px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f5f5f5}
.srow:last-child{border:none}
.srow-label{font-size:12px;color:#555}
.srow-num{font-size:14px;font-weight:800;color:#1a1a1a}
.sbar{height:3px;background:#f0f0f0;border-radius:2px;margin-top:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:2px;transition:.4s}
.big-num{text-align:center;padding:16px 0}
.big-num .n{font-size:44px;font-weight:800;color:#b5841a;line-height:1}
.big-num .l{font-size:11px;color:#aaa;text-transform:uppercase;margin-top:4px}
.big-num .s{font-size:11px;color:#bbb;margin-top:2px}
.pitem{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed #f0f0f0;align-items:flex-start}
.pitem:last-child{border:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.pname{font-size:13px;font-weight:600}
.pnote{font-size:11px;color:#888;margin-top:1px}
.empty-state{color:#bbb;text-align:center;padding:2rem;font-size:13px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:14px}
.dash-card{background:#fff;border:1px solid #e4e4e4;border-radius:12px;padding:16px}
.dash-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#aaa;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.dash-card h3 span{font-size:18px;font-weight:800;color:#b5841a}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px dashed #f0f0f0}
.action-item:last-child{border:none}
.action-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.action-name{font-size:13px;font-weight:600}
.action-note{font-size:11px;color:#888;margin-top:1px}
.action-tag{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap;margin-left:auto;flex-shrink:0}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.kpi-box{background:#fff;border:1px solid #e4e4e4;border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:.15s}
.kpi-box:hover{border-color:#b5841a55;background:#fffbf2}
.kpi-num{font-size:28px;font-weight:800;color:#b5841a;line-height:1}
.kpi-lbl{font-size:10px;color:#aaa;margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.kpi-sub{font-size:11px;color:#888;margin-top:2px}
.funnel-step{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5}
.funnel-step:last-child{border:none}
.funnel-bar{flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.funnel-fill{height:100%;border-radius:3px;transition:.4s}
.funnel-num{font-size:13px;font-weight:800;color:#1a1a1a;width:28px;text-align:right}
.funnel-lbl{font-size:12px;color:#555;width:140px}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.qa-btn{padding:9px 16px;border-radius:8px;border:1px solid #e4e4e4;background:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:#555;transition:.15s;display:flex;align-items:center;gap:6px}
.qa-btn:hover{border-color:#b5841a;color:#b5841a;background:#fffbf2}
.today-banner{background:linear-gradient(135deg,#b5841a18,#b5841a08);border:1px solid #b5841a44;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.client-mini{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5}
.client-mini:last-child{border:none}
.call-item{padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.call-item:last-child{border:none}
.call-item-name{font-weight:600}
.call-item-meta{font-size:11px;color:#888;margin-top:1px}
/* Active Clients */
.client-card{background:#fff;border:1px solid #e4e4e4;border-radius:10px;padding:14px 16px;margin-bottom:8px}
.client-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:12px}
.client-name{font-size:15px;font-weight:700}
.client-plan{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
.plan-97{background:#fffbf0;color:#7a5010;border:1px solid #b5841a44}
.plan-12k{background:#f0f0ff;color:#3a1a9a;border:1px solid #6a20c044}
.plan-100k{background:#fff0e8;color:#8a2000;border:1px solid #cc440044}
.plan-unicorn{background:#fdf0ff;color:#6a0080;border:1px solid #aa44cc44}
.client-fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:10px}
.cf-group{display:flex;flex-direction:column;gap:3px}
.cf-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#aaa}
.cf-input{border:1px solid #eee;border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;background:#fafaf8;width:100%}
.cf-input:focus{outline:none;border-color:#b5841a}
.expiry-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:6px}
.exp-ok{background:#e8f5e8;color:#1b5e20}
.exp-soon{background:#fff3e0;color:#e65100}
.exp-red{background:#fde8e8;color:#c62828}
.client-calls{margin-top:10px;padding-top:10px;border-top:1px solid #f5f5f5}
.client-calls-title{font-size:10px;font-weight:700;text-transform:uppercase;color:#888;letter-spacing:.04em;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.call-entry{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:5px;align-items:center}
.call-entry input{border:1px solid #eee;border-radius:6px;padding:5px 8px;font-size:11px;font-family:inherit;background:#fafaf8;width:100%}
.call-entry input:focus{outline:none;border-color:#b5841a}
.call-del{font-size:11px;padding:3px 8px;border:1px solid #f0c0c0;border-radius:5px;background:#fff;color:#c04040;cursor:pointer;font-family:inherit;white-space:nowrap}
.add-call-btn{font-size:11px;padding:4px 10px;border:1px solid #b5841a44;border-radius:6px;background:#fffbf2;color:#b5841a;cursor:pointer;font-family:inherit;font-weight:600}
.client-flash{font-size:10px;color:#28a745;font-weight:700;height:14px;margin-top:4px}
.admin-stage{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
.admin-stage-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#b5841a;margin-bottom:7px}
.admin-checks{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.admin-chk{display:flex;align-items:center;gap:6px;font-size:11px;color:#555;cursor:pointer;padding:5px 8px;border-radius:6px;border:1px solid #eee;background:#fafaf8;user-select:none;transition:.12s}
.admin-chk:hover{border-color:#b5841a44;background:#fffbf2}
.admin-chk.ac-on{background:#f0fdf0;border-color:#2d7a2d55;color:#1a5c1a;font-weight:600}
.admin-chk .ac-box{width:14px;height:14px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;background:#fff}
.admin-chk.ac-on .ac-box{background:#28a745;border-color:#28a745;color:#fff}
.renewal-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.renewal-row label{font-size:10px;font-weight:700;text-transform:uppercase;color:#aaa;white-space:nowrap}
.renewal-row input{border:1px solid #eee;border-radius:6px;padding:5px 9px;font-size:12px;font-family:inherit;background:#fafaf8;flex:1}
.renewal-row input:focus{outline:none;border-color:#b5841a}
/* Social Content */
.content-card{background:#fff;border:1px solid #e4e4e4;border-radius:10px;padding:14px 16px;margin-bottom:8px}
.content-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:start}
.content-field{display:flex;flex-direction:column;gap:3px}
.content-field label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#aaa}
.content-field input,.content-field select,.content-field textarea{border:1px solid #eee;border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;background:#fafaf8;width:100%}
.content-field input:focus,.content-field select:focus,.content-field textarea:focus{outline:none;border-color:#b5841a}
.content-field textarea{min-height:60px;resize:vertical}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-draft{background:#ccc}
.dot-scheduled{background:#2a4acc}
.dot-posted{background:#28a745}
.dot-idea{background:#b5841a}
.content-stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cs-stat{background:#fff;border:1px solid #e4e4e4;border-radius:8px;padding:8px 14px;text-align:center;min-width:80px}
.cs-num{font-size:20px;font-weight:800;color:#b5841a}
.cs-lbl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.04em}
.del-row-btn{padding:5px 8px;border:1px solid #f0c0c0;border-radius:6px;background:#fff;color:#c04040;cursor:pointer;font-size:12px;margin-top:14px;font-family:inherit}
.list-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e4e4e4;font-size:12px}

var BACKUP_KEYS = ['r1000_leads_v3','r1000_clients_v1','r1000_content_v1','r1000_events_v1','r1000_va_v1'];
function exportBackup() {
  var dump = { _app:'RAWSOME MISSION CONTROL', _version:1, _exportedAt:new Date().toISOString(), data:{} };
  BACKUP_KEYS.forEach(function(k){
    var raw = localStorage.getItem(k);
    if (raw != null) dump.data[k] = raw;
  });
  var blob = new Blob([JSON.stringify(dump, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = 'rawsome_backup_' + stamp + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}


// Re-applies the latest known updates to whatever is in saved data.
// Fixes cases where the saved copy is out of sync (e.g. Conversions showing 2 not 3).
function syncUpdates() {
  var report = [];
  // 1) $97/m signups — dedupe duplicates, then flag
  var SIGNED_97 = [['jeff','yeo'],['lisa','chai'],['dott','chu']];
  SIGNED_97.forEach(function(parts) {
    var matches = leads.filter(function(l){
      var nm = (l.name||'').trim().toLowerCase();
      return parts.every(function(p){ return nm.indexOf(p) >= 0; });
    });
    if (matches.length === 0) { report.push('⚠️ Not found: ' + parts.join(' ')); return; }
    // If duplicates exist, keep the first and remove the rest
    var keep = matches[0];
    if (matches.length > 1) {
      var removeIds = matches.slice(1).map(function(l){ return l.id; });
      leads = leads.filter(function(l){ return removeIds.indexOf(l.id) < 0; });
      report.push('Merged ' + matches.length + ' duplicate records for ' + keep.name);
    }
    keep.step_new=true; keep.step_chat_sent=true; keep.step_ongoing=true; keep.step_invited=true;
    keep.step_confirmed=true; keep.step_attended=true; keep.step_offered_97=true; keep.step_r1000=true;
    keep.status='converted'; keep.msg1_sent=true; keep.updatedAt=Date.now();
  });
  // 2) Safety sweep: anyone flagged signed $97/m counts as converted
  leads.forEach(function(l){ if (l.step_r1000 && l.status !== 'converted') l.status = 'converted'; });

  save();
  // Also patch the July 10 event confirmations
  try {
    var ev = events.find(function(e){ return e.id === 'ev_1782973992117' || (e.name||'').indexOf('Dott Chu') >= 0; });
    if (ev) {
      if (!ev.invites) ev.invites = {};
      ['Dott Chu','Nadezhda Khvorostian','Promise Gabriel','Sohayla Smith','Ranguru Jeremy','Twee Shaw','Daiyan','Agnes Lim','Gulnara Magadeyeva','Emma Lenehan'].forEach(function(n){ ev.invites[n] = 'confirmed'; });
      ev.invites['Jeff Yeo'] = 'maybe';
      ev.invites['Philippa Holding'] = 'declined';
      saveEvents();
    }
  } catch(e) {}

  // Restore any missing seed content posts (merge by id, don't wipe user's own)
  var contentAdded = 0;
  try {
    var existingCids = {};
    contentItems.forEach(function(c){ existingCids[c.id] = true; });
    CONTENT_SEED.forEach(function(seed){
      if (!existingCids[seed.id]) { contentItems.push(Object.assign({}, seed)); contentAdded++; }
    });
    if (contentAdded > 0) saveContent();
    if (typeof renderContentTab === 'function') renderContentTab();
  } catch(e) {}

  render();
  renderDashboard();
  var conv = leads.filter(function(l){ return l.step_r1000; }).length;
  alert('Sync complete.\n$97/m conversions: ' + conv + '\nContent posts restored: ' + contentAdded + '\n' + (report.length ? report.join('\n') : 'All lead records up to date.'));
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      leads = JSON.parse(raw);
      // Merge in any INITIAL leads not yet in saved storage (full objects, all fields)
      const names = new Set(leads.map(l => (l.name||'').toLowerCase()));
      INITIAL.forEach(function(l) {
        if (!names.has((l.name||'').toLowerCase())) {
          leads.push(JSON.parse(JSON.stringify(l)));
        }
      });
    } else {
      leads = JSON.parse(JSON.stringify(INITIAL));
      save();
    }
  } catch(e) {
    console.error('Load error:', e);
    leads = JSON.parse(JSON.stringify(INITIAL));
  }
  render();
  renderStats();
}

function getFiltered() {
  var q = document.getElementById('searchQ').value.toLowerCase();
  var fs = document.getElementById('fStatus').value;
  var fr = document.getElementById('fReact').value;
  return leads.filter(function(l) {
    if (q && l.name.toLowerCase().indexOf(q) < 0 && (l.notes||'').toLowerCase().indexOf(q) < 0) return false;
    if (fs && l.status !== fs) return false;
    if (fr === 'love' && l.reaction !== 'love') return false;
    if (fr === 'like' && l.reaction !== 'like') return false;
    if (fr === 'comment' && !l.commented) return false;
    return true;
  });
}

  {f:"step_12k",       i:"💰", l:"$12K ✅"}
];
var J_FLAGS = [
  {f:"step_recording", c:"jf-recording", i:"🎥", l:"Recording Sent"},
  {f:"step_followup",  c:"jf-followup",  i:"🔄", l:"Follow Up Later"},

function buildJourney(lead) {
  var lastDone = -1;
  J_STAGES.forEach(function(s,i){ if(lead[s.f]) lastDone=i; });
  var html = '<div class="sec-lbl">Journey Stage</div><div class="journey-wrap">';
  html += '<div class="journey-stages">';
  J_STAGES.forEach(function(s, i) {
    var done = !!lead[s.f];
    var active = done && (i === lastDone);
    var cls = 'j-stage j-stage-item' + (active ? ' j-active' : done ? ' j-done' : '');
    html += '<div class="' + cls + '" data-id="' + lead.id + '" data-field="' + s.f + '">';
    html += '<span class="j-num">' + (done ? '&#10003;' : (i+1)) + '</span>';
    html += '<span class="j-icon">' + s.i + '</span>';
    html += '<span class="j-lbl">' + s.l + '</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="j-flags">';
  J_FLAGS.forEach(function(f) {
    var on = !!lead[f.f];
    html += '<div class="j-flag ' + f.c + (on ? ' jf-on' : '') + ' j-flag-item" data-id="' + lead.id + '" data-field="' + f.f + '">';
    html += '<div class="jf-box">' + (on ? '&#10003;' : '') + '</div>';
    html += f.i + ' ' + f.l + '</div>';
  });
  html += '</div></div>';
  return html;
}

function escHtml(s) {

  document.getElementById('overlay').style.display = 'none';

function saveLead() {
  var id = document.getElementById('mId').value;
  var name = document.getElementById('mName').value.trim();
  if (!name) { alert('Please enter a name'); return; }
  var data = {
    name: name,
    reaction: document.getElementById('mReaction').value,
    commented: document.getElementById('mCommented').value === '1',
    status: document.getElementById('mStatus').value,
    notes: document.getElementById('mNotes').value,
    updatedAt: Date.now()
  };
  if (id) {
    var lead = findLead(id);
    if (lead) Object.assign(lead, data);
  } else {
    data.id = 'new_' + Date.now();
    data.msg1_sent = false;
    leads.push(data);
  }
  save();
  closeModal();
  render();
}

function deleteLead() {
  var id = document.getElementById('mId').value;
  if (!id || !confirm('Remove this lead?')) return;
  leads = leads.filter(function(l){ return String(l.id) !== String(id); });
  save();
  closeModal();
  render();
}

// ── TABS ──────────────────────────────────────────────
function switchToTab(name) {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    var oc = tabs[i].getAttribute('onclick') || '';
    if (oc.indexOf("'" + name + "'") > -1 || oc.indexOf('"' + name + '"') > -1) {
      showTab(name, tabs[i]);
      return;
    }
  }
}
function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('on'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  el.classList.add('on');
  document.getElementById('panel-' + name).classList.add('on');
  if (name === 'dashboard') renderDashboard();
  if (name === 'list') renderListView();
  if (name === 'events') renderEventsTab();
  if (name === 'va') renderVATab();
  if (name === 'clients') renderClientsTab();
  if (name === 'content') renderContentTab();
  if (name === 'scripts') renderScriptsTab();
}

// Jump from Quick List (or anywhere) to a lead's profile card in the Leads dashboard
function gotoLead(id) {
  // Switch to the Leads tab
  var leadsTabBtn = Array.prototype.slice.call(document.querySelectorAll('.tab')).find(function(t){
    return /Leads/.test(t.textContent);
  });
  if (leadsTabBtn) showTab('leads', leadsTabBtn);
  // Clear any board filters that might hide the card
  try {
    var sq = document.getElementById('searchQ'); if (sq) sq.value = '';
    var fs = document.getElementById('fStatus'); if (fs) fs.value = '';
    var fr = document.getElementById('fReact'); if (fr) fr.value = '';
  } catch(e) {}
  // Re-render so the card exists
  if (typeof render === 'function') render();
  // Scroll to and highlight the card
  setTimeout(function(){
    var card = document.getElementById('card-' + id);
    if (!card) { alert('This lead is not visible in the current Leads view (it may be filtered out).'); return; }
    card.scrollIntoView({behavior:'smooth', block:'center'});
    card.classList.add('card-flash');
    setTimeout(function(){ card.classList.remove('card-flash'); }, 2200);
  }, 60);
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr + 'T12:00:00');
  return Math.round((d - new Date()) / 86400000);
}

function expiryBadge(dateStr) {
  if (!dateStr) return '';
  var days = daysUntil(dateStr);
  var cls = days > 30 ? 'expiry-badge exp-ok' : days > 7 ? 'expiry-badge exp-soon' : 'expiry-badge exp-red';
  var lbl = days < 0 ? 'Expired ' + Math.abs(days) + 'd ago' : days === 0 ? 'Expires today!' : 'Expires in ' + days + 'd';
  return '<span class="' + cls + '">' + lbl + '</span>';
}

    if (!parsed || !parsed.length) {

// Event delegation — avoids all quote-escaping issues
document.getElementById('grid').addEventListener('change', function(e) {
  var card = e.target.closest('[data-id]');
  if (!card) return;
  var id = card.getAttribute('data-id');
  if (e.target.classList.contains('lead-source-inp')) { var l=findLead(id); if(l){l.lead_source=e.target.value;l.updatedAt=Date.now();save();flash(id);} return; }

  if (e.target.classList.contains('notes-ta')) updateNotes(id, e.target.value);
});

document.getElementById('grid').addEventListener('click', function(e) {
  if (e.target.classList.contains('edit-btn')) {
    var card = e.target.closest('[data-id]');
    if (card) openEdit(card.getAttribute('data-id'));
    return;
  }
  // Journey stage click — set current stage (marks all previous as done too)
  var jStage = e.target.closest('.j-stage-item');
  if (jStage && jStage.closest('#grid')) {
    var id = jStage.getAttribute('data-id');
    var clickedField = jStage.getAttribute('data-field');
    var lead = findLead(id);
    if (!lead) return;
    // Find index of clicked stage
    var clickedIdx = -1;
    J_STAGES.forEach(function(s,i){ if(s.f===clickedField) clickedIdx=i; });
    // If clicking the current active stage, clear it (go back one)
    var currentIdx = -1;
    J_STAGES.forEach(function(s,i){ if(lead[s.f]) currentIdx=i; });
    if (clickedIdx === currentIdx) {
      // Deselect current, go back one
      lead[clickedField] = false;
    } else {
      // Set all stages up to and including clicked as done
      J_STAGES.forEach(function(s,i){
        lead[s.f] = (i <= clickedIdx);
      });
    }
    lead.updatedAt = Date.now();
    save(); flash(id);
    // Update all stage visuals directly in DOM
    var card = document.getElementById('card-' + id);
    if (card) {
      var newLastDone = -1;
      J_STAGES.forEach(function(s,i){ if(lead[s.f]) newLastDone=i; });
      card.querySelectorAll('.j-stage-item').forEach(function(el, i) {
        var done = !!lead[J_STAGES[i].f];
        var active = done && (i === newLastDone);
        el.className = 'j-stage j-stage-item' + (active ? ' j-active' : done ? ' j-done' : '');
        el.querySelector('.j-num').textContent = done ? '✓' : (i+1);
      });
    }
    return;
  }
  // Journey flag toggle
  var jFlag = e.target.closest('.j-flag-item');
  if (jFlag && jFlag.closest('#grid')) {
    var id = jFlag.getAttribute('data-id');
    var field = jFlag.getAttribute('data-field');
    var colorCls = jFlag.className.split(' ').find(function(c){ return c.startsWith('jf-') && c !== 'jf-on'; });
    var lead = findLead(id);
    if (!lead) return;
    lead[field] = !lead[field];
    lead.updatedAt = Date.now();
    save(); flash(id);
    if (lead[field]) { jFlag.classList.add('jf-on'); jFlag.querySelector('.jf-box').innerHTML = '&#10003;'; }
    else { jFlag.classList.remove('jf-on'); jFlag.querySelector('.jf-box').innerHTML = ''; }
    return;
  }
  // Nurture-for checkbox toggle (multi-select array)
  var nchk = e.target.closest('.nurture-chk');
  if (nchk && nchk.closest('#grid')) {
    var id = nchk.getAttribute('data-id');
    var val = nchk.getAttribute('data-val');
    var lead = findLead(id);
    if (!lead) return;
    var arr = Array.isArray(lead.nurture_for) ? lead.nurture_for : (lead.nurture_for ? [lead.nurture_for] : []);
    var idx = arr.indexOf(val);
    if (idx >= 0) { arr.splice(idx,1); nchk.classList.remove('ck-gold'); nchk.querySelector('.chk-box').innerHTML=''; }
    else { arr.push(val); nchk.classList.add('ck-gold'); nchk.querySelector('.chk-box').innerHTML='&#10003;'; }
    lead.nurture_for = arr;
    lead.updatedAt = Date.now();
    save(); flash(id);
    return;
  }
  // Admin checkbox toggle
  var chk = e.target.closest('.chk-item');
  if (chk && chk.closest('#grid')) {
    var id = chk.getAttribute('data-id');
    var field = chk.getAttribute('data-field');
    var color = chk.getAttribute('data-color');
    var lead = findLead(id);
    if (!lead) return;
    lead[field] = !lead[field];
    lead.updatedAt = Date.now();
    save();
    flash(id);
    if (lead[field]) {
      chk.classList.add('ck-' + color);
      chk.querySelector('.chk-box').innerHTML = '&#10003;';
    } else {
      chk.classList.remove('ck-green','ck-gold','ck-blue');
      chk.querySelector('.chk-box').innerHTML = '';
    }
  }
});

function copyScriptStep(sid, idx, btn) {
  var s = SCRIPTS_DATA.find(function(x){ return x.id === sid; });
  if (!s) return;
  var text = s.steps[idx].msg;
  var done = function(){
    var old = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = old; btn.classList.remove('copied'); }, 1600);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text); done(); });
  } else { fallbackCopy(text); done(); }
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}
